services:
  postgres:
    image: postgres:16
    container_name: clm-postgres
    environment:
      POSTGRES_DB: clm
      POSTGRES_USER: clm
      POSTGRES_PASSWORD: clm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: clm-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
